name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main
      - 'release/**'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Lint

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHP-CS-Fixer
        run: ./vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Run PHPCS
        continue-on-error: true
        run: ./vendor/bin/phpcs

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Test (L${{ matrix.laravel }} / PHP ${{ matrix.php }})

    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 12 (testbench ^10.2, pest-plugin-laravel ^3.2)
          - php: '8.2'
            laravel: '12'
            testbench: '^10.2'
            pest-plugin-laravel: '^3.2'
          - php: '8.3'
            laravel: '12'
            testbench: '^10.2'
            pest-plugin-laravel: '^3.2'
          - php: '8.4'
            laravel: '12'
            testbench: '^10.2'
            pest-plugin-laravel: '^3.2'
          # Laravel 13 (testbench ^11.0, pest-plugin-laravel ^4.1) — requires PHP 8.3+
          - php: '8.3'
            laravel: '13'
            testbench: '^11.0'
            pest-plugin-laravel: '^4.1'
          - php: '8.4'
            laravel: '13'
            testbench: '^11.0'
            pest-plugin-laravel: '^4.1'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php${{ matrix.php }}-laravel${{ matrix.laravel }}-composer-

      - name: Remove lint-only dev dependencies
        # The code-style toolchain can constrain illuminate/support and would
        # block newer Laravel legs. Linting runs in its own job.
        run: >
          composer remove --dev --no-update --no-interaction
          friendsofphp/php-cs-fixer
          artisanpack-ui/code-style
          artisanpack-ui/code-style-pint
          dealerdirect/phpcodesniffer-composer-installer

      - name: Pin Laravel version
        run: |
          composer require \
            "laravel/framework:^${{ matrix.laravel }}.0" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            "pestphp/pest-plugin-laravel:${{ matrix.pest-plugin-laravel }}" \
            --no-interaction --no-update --dev

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --with-all-dependencies

      - name: Run Unit tests
        env:
          XDEBUG_MODE: off
        run: vendor/bin/pest tests/Unit --no-coverage

      - name: Run Feature tests
        env:
          XDEBUG_MODE: off
        run: vendor/bin/pest tests/Feature --no-coverage
